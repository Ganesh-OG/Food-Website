<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset</title>

<link rel="shortcut icon" href="images/ngplogo.jpg">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/password_reset.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>

<body style="display:flex; flex-direction:column; min-height:100vh;">

<!-- HEADER -->
<div id="headerContainer"></div>

<div class="main-content">
   <div class="login-container">
      <div class="login-box">

         <h2>Reset Password</h2>
         <p class="login-subtitle">Securely update your account password</p>

         <form id="updateForm">

            <!-- EMAIL -->
            <div class="form-group">
               <label><i class="fas fa-envelope"></i> Email:</label>
               <input type="email" id="email" readonly>
            </div>

            <!-- CURRENT PASSWORD -->
            <div class="form-group">
               <label><i class="fas fa-key"></i> Current Password:</label>

               <input type="text" id="current_password" autocomplete="new-password" required>

               <!-- ✅ Tick FIRST -->
               <span id="currentPasswordTick" class="tick"></span>

               <!-- ✅ Eye LAST -->
               <i class="fas fa-eye-slash eye-icon" id="current_passwordEyeIcon"></i>
            </div>

            <!-- NEW PASSWORD -->
            <div class="form-group">
               <label><i class="fas fa-lock"></i> New Password:</label>

               <input type="text" id="new_password" autocomplete="new-password" required minlength="6">

               <i class="fas fa-eye-slash eye-icon" id="new_passwordEyeIcon"></i>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
               <label><i class="fas fa-lock"></i> Confirm Password:</label>

               <input type="text" id="confirm_password" autocomplete="new-password" required>

               <span id="confirmPasswordTick" class="tick"></span>

               <i class="fas fa-eye-slash eye-icon" id="confirm_passwordEyeIcon"></i>
            </div>

            <button type="submit" class="btn-login">Update Password</button>

         </form>

         <div class="guest-links">
            <p><a href="profile.html"><i class="fas fa-arrow-left"></i> Back to Profile</a></p>
         </div>

      </div>
   </div>
</div>

<!-- FOOTER -->
<div id="footerContainer"></div>

<!-- POPUP -->
<div id="popup" class="popup">
   <span id="popupMessage"></span>
   <span id="popupClose">✖</span>
</div>

<!-- MODULES -->
<script type="module" src="components/JS/header_loader.js"></script>
<script type="module" src="components/JS/user_header.js"></script>
<script type="module" src="components/JS/footer.js"></script>
<script type="module" src="components/JS/password_reset.js"></script>

</body>
</html>
