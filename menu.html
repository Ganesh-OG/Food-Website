<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu</title>

    <link rel="shortcut icon" href="images/ngplogo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ================= POPUP ================= */
        #popupBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);

            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;

            font-size: 14px;
            font-weight: 500;

            z-index: 999999; /* 🔥 Always on top */

            opacity: 0;
            transition: all 0.3s ease;

            pointer-events: none;
        }

        /* SHOW STATE */
        #popupBox.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* SUCCESS */
        #popupBox.success {
            background: #28a745;
        }

        /* ERROR */
        #popupBox.error {
            background: #dc3545;
        }
    </style>
</head>

<body>

<div id="headerContainer"></div>

<div class="heading">
    <h3>Menu</h3>
</div>

<section class="products">
    <h1 class="title">latest dishes</h1>

    <div class="box-container" id="menuContainer"></div>
</section>

<div id="footerContainer"></div>
<div id="popupBox">
    <span id="popupMessage"></span>
</div>
<!-- POPUP -->
<div id="popupBox" style="display:none;">
    <div id="popupMessage"></div>
</div>

<script type="module" src="components/JS/add_cart.js"></script>
<script type="module" src="components/JS/menu.js"></script>
<script type="module" src="components/JS/user_header.js"></script>
<script type="module" src="components/JS/footer.js"></script>

</body>
</html>
