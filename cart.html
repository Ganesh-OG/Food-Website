<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<link rel="shortcut icon" href="images/ngplogo.jpg">

<!-- SAME AS PHP -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
        /* Add your custom styles based on the reference code */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .heading {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
        }

        .cart {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Styles for Proceed to Payment button */
        .item-actions button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .item-actions button:hover {
            background-color: #218838;
        }

        .product-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
        }

        .item-details {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            flex-grow: 1;
            text-align: left;
        }

        .item img {
            max-width: 65px;
            max-height: 65px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 10px;
        }

        .item img,
        .item-name,
        .item-price,
        .item-quantity,
        .item-total,
        .item-actions {
            margin-right: 20px;
            /* Adjust the margin for spacing between elements */
        }

        /* Style for quantity input */
        .item-quantity input {
            width: 30px;
            /* Adjust the width to your preference */
            height: 25px;
            /* Adjust the height to your preference */
            text-align: center;
            border: 1px solid #ddd;
            /* Border for input */
            border-radius: 5px;
            /* Adjust border radius for rounded corners */
            margin-right: 3px;
            /* Adjust margin for spacing between input and buttons */
        }

        /* Style for quantity buttons */
        .quantity-btn {
            cursor: pointer;
            color: #333;
            background-color: #ddd;
            /* Background color for buttons */
            padding: 3px;
            /* Adjust padding for spacing inside the button */
            border: 1px solid #ccc;
            /* Border for buttons */
            border-radius: 3px;
            /* Adjust border radius for rounded corners */
        }

        .quantity-btn:hover {
            color: #009688;
            background-color: #ccc;
            /* Background color on hover */
        }

        /* Styles for Remove Item button */
        .item-actions i {
            color: #ff4d4d;
            cursor: pointer;
            transition: color 0.3s;
        }

        .item-actions i:hover {
            color: #ff1a1a;
        }

        .gray-rectangle-box {
        width: 100%; /* Set width to 100% to match the width of the product boxes */
        padding: 30px;
        border-radius: 8px;
        margin-top: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: background-color 0.3s;

        /* Center the text and icon */
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .gray-rectangle-box:hover {
        background-color: #e0e0e0;
    }

        /* Responsive adjustments for mobile devices */
        @media only screen and (max-width: 767px) {

            .cart {
                max-width: 100%; /* Adjusted for mobile devices */
                padding: 10px; /* Added padding for better spacing on mobile */
            }

            .item img,
            .item-name,
            .item-price,
            .item-quantity,
            .item-total,
            .item-actions {
                margin-right: 10px; /* Maintain the same margin for spacing on small screens */
            }

            .item-quantity input {
                width: 30px; /* Maintain the same width for quantity input on small screens */
                margin-right: 3px; /* Maintain the same margin for spacing on small screens */
                margin-bottom: 10px; /* Add some space between input and buttons on small screens */
            }

            .quantity-btn {
                padding: 3px; /* Maintain the same padding for spacing inside the button on small screens */
                margin-bottom: 10px; /* Add some space between buttons on small screens */
            }
        }
    /* Add this CSS to style the custom dropdown */
    .custom-dropdown.payment-dropdown {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin-top: 10px;
        width: 25%; /* Set the width to 50% */
        font-size: 16px;
        color: white; /* Set text color to black */
        background-color: #00FFFF; /* Set default background color to #00FFFF */
        position: relative;
    }

    .custom-dropdown-selected {
        display: block;
        padding: 8px;
        cursor: pointer;
    }

    .custom-dropdown-options {
        display: none;
        position: absolute;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: 1px solid #ddd;
        border-radius: 5px;
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
    }

    .custom-dropdown-options li {
        padding: 8px;
        cursor: pointer;
        background-color: #FDFEFE; /* Set default option background color to #00FFFF */
        color: black; /* Set text color to black */
    }

    .custom-dropdown-options li:hover {
        background-color: #40E0D0; /* Set hover/focus background color to #40E0D0 */
    }

    .custom-dropdown::after {
        content: '\25BC'; /* Unicode character for down arrow */
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        color: white; /* Set arrow color to match text color */
    }
    .custom-dropdown-options.show-options 
    {
    display: block;
    }
    /* 🔥 ONLY ADDITION (no break) */
    #walletDisplay {
        font-weight: bold;
        background: #e8f8f5;
        text-align: center;
        border-bottom: 1px solid #ddd;
        cursor: default;
    }
    .popup {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .popup-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        width: 300px;
    }

    .popup-content button {
        margin-top: 10px;
        padding: 8px 15px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
    }

        
    </style>
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";
</script>

<div id="headerContainer"></div>

<div class="heading">
   <h3>Shopping Cart</h3>
</div>

<section class="products">
   <h1 class="title">your cart</h1>
</section>

<div class="cart">

   <div class="item-header">
      <div class="item">Item</div>
      <div class="item-name">Item Name</div>
      <div class="item-price">Price per Item</div>
      <div class="item-quantity">Quantity</div>
      <div class="item-total">Total</div>
      <div class="item-actions"></div>
   </div>

   <div id="cartContainer"></div>

   <button class="gray-rectangle-box" onclick="redirectToMenu()">
      <i class="fas fa-plus-circle"></i>
      Add More Items To Cart
   </button>

   <br>

   <!-- ✅ FIXED DROPDOWN -->
   <div class="custom-dropdown payment-dropdown"
        id="paymentBox"
        data-wallet-balance="0"
        data-overall-total="0">

      <span class="custom-dropdown-selected">Choose Payment</span>

      <ul class="custom-dropdown-options">
         <li data-value="--">Choose Payment</li>
         <li data-value="credit card">Credit Card</li>
         <li data-value="debit card">Debit Card</li>

         <!-- ✅ ONLY ONE WALLET OPTION -->
         <li data-value="Wallet" id="walletOption">
            <i class="fas fa-wallet"></i> Wallet : ₹0
         </li>

         <li data-value="upi">UPI</li>
      </ul>
   </div>

   <!-- TOTAL -->
   <div class="item-header">
      <div></div><div></div><div></div><div></div>

      <div class="item-total" id="overallTotal">
         Overall Total: ₹0
      </div>

      <div class="item-actions">
         <button id="proceedToPaymentBtn">Proceed to Payment</button>
      </div>
   </div>

   <p class="empty" id="emptyMsg" style="display:none">Your cart is empty</p>

</div>

<div id="footerContainer"></div>

<!-- POPUP -->
<div id="popupBox" class="popup">
    <div class="popup-content">
        <p id="popupMessage"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<!-- LOADER -->
<div id="loaderBox" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center; flex-direction:column; color:white;">
    
    <div style="border:5px solid #f3f3f3; border-top:5px solid #00ffff; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite;"></div>

    <p id="loaderText" style="margin-top:15px;">Processing...</p>
</div>


<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
function redirectToMenu(){
   window.location.href="menu.html";
}

function closePopup(){
   document.getElementById("popupBox").style.display = "none";
}
</script>

<script type="module" src="components/JS/cart.js"></script>
<script type="module" src="components/JS/payment.js"></script>
<script type="module" src="components/JS/user_header.js"></script>
<script type="module" src="components/JS/footer.js"></script>

</body>
