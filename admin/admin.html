<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/admin.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Admin Panel</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <!-- 👇 Controlled by RBAC -->
        <button data-power="VIEW_DASHBOARD">Dashboard</button>
        <button data-power="VIEW_PRODUCTS">Products</button>
        <button data-power="ADD_PRODUCT" onclick="addProduct()">Add Product</button>
        <button data-power="VIEW_USERS">Users</button>
        <button data-power="VIEW_ORDERS">Orders</button>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="card">
            <div class="title">Welcome</div>
            <div id="userName"></div>
            <div id="userEmail"></div>
        </div>

        <div class="card">
            <div class="title">Quick Actions</div>
            <p>Use the sidebar to navigate through admin features.</p>
        </div>

    </div>

</div>

<!-- ✅ LOAD ADMIN LOGIC -->
<script type="module" src="./js/admin.js"></script>

</body>
</html>
